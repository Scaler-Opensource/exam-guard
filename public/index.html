<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Proctoring Library Test</title>
  <link href="https://fonts.cdnfonts.com/css/source-sans-pro" rel="stylesheet" />
  <style>
    html {
      font-size: 10px;
    }
    .status-good { color: green; font-weight: bold; }
    .status-poor { color: red; font-weight: bold; }
    .status-offline { color: darkred; background: #ffd1d1; padding: 5px; }
  </style>
</head>

<body>
  <h1 class="text-3xl font-bold mb-4">Proctoring Library Test</h1>

  <div class="mb-4" style="border: 1px solid #ccc; padding: 10px; border-radius: 8px;">
    <h2 class="text-2xl font-semibold mb-2">Network Health</h2>
    <div id="network-display">Waiting for data...</div>
  </div>

  <div class="mb-4">
    <h2 class="text-2xl font-semibold mb-2">Captured Snapshot:</h2>
    <img id="snapshot" alt="Snapshot will appear here" class="max-w-full h-auto" />
  </div>
  <div class="mb-4">
    <h2 class="text-2xl font-semibold mb-2">Captured Screenshot:</h2>
    <img id="screenshot" alt="Screenshot will appear here" class="max-w-full h-auto" />
  </div>
  <div id="root"></div>

  <!-- Add React and ReactDOM before proctor.js -->

  <!-- Include the Webpack bundle -->
  <!-- Using the latest CDN  -->
  <script src="proctor.js"></script>

  <script>
    Proctor.initialize('root', {
      baseUrl: 'http://localhost:8080',
      enableAllAlerts: true,
      assessmentInfo: {
        userName: 'John Doe',
        assessmentName: 'Assessment 1',
      },
      initConfig: {
        baseUrl: 'http://localhost:3000',
        payload: {
          api_context: {
            id: 16884,
            type: 'interviewbit_test',
          },
        },
      },
      networkConfig: {
        enabled: true,
        interval: 5000, // Check every 5 seconds for testing   
      },
      config: {
        tabSwitch: {
          enabled: true,
          showAlert: true,
          recordViolation: true,
        },
      },
      snapshotConfig: {
        enabled: true,
        frequency: 3000,
        resizeTo: { width: 160, height: 120 },
      },
      enableProctoring: false,
      mobilePairingConfig: {
        enabled: true,
      },
      beepConfig: {
        enabled: true,
        sounds: {
          screenShare: '',
          cameraShare: '',
          mobileCameraShare: '',
          compatibilityChecks: '',
        },
      },
      callbacks: {
        onWorkflowComplete: () => {
          console.error('onWorkflowComplete triggered');
        },

        onNetworkUpdate: (metric) => {
          // console.log('Network Update:', metric);
          const displayEl = document.getElementById('network-display');

          if (metric.error) {
            displayEl.innerHTML = `<span class="status-offline">⚠️ Error: ${metric.error}</span>`;
            return;
          }

          const speedKbps = metric.speedKbps;
          const speedMbps = (speedKbps / 1024).toFixed(2);
          
          let statusHtml = '';
          if (speedKbps < 500) {
             statusHtml = `<span class="status-poor">POOR (${speedMbps} Mbps)</span> - Video may lag`;
          } else {
             statusHtml = `<span class="status-good">GOOD (${speedMbps} Mbps)</span>`;
          }

          displayEl.innerHTML = `Current Speed: ${statusHtml} <br><small>Last check: ${new Date(metric.timestamp).toLocaleTimeString()}</small>`;
        },

        onSnapshotSuccess: ({ blob }) => {
          console.log('onSnapshotSuccess', blob);
          const snapshotImg = document.getElementById('snapshot');
          if (snapshotImg) {
            const imageUrl = URL.createObjectURL(blob);
            snapshotImg.src = imageUrl;
          }
        },
        onScreenshotSuccess: ({ blob }) => {
          console.log('onScreenshotSuccess', blob);
          const screenshotImg = document.getElementById('screenshot');
          if (screenshotImg) {
            const imageUrl = URL.createObjectURL(blob);
            screenshotImg.src = imageUrl;
          }
        },
        onDisqualified: () => {
          console.log('onDisqualified triggered');
        },
      },
    });
  </script>
</body>

</html>
